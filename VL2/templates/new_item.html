{% extends 'base.html' %}

{% block titel %}
New Item
{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Neuen Inhalt anlegen</h2>

  {% if message %}
  <div class="alert alert-danger">{{ message }}</div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label for="title" class="form-label">Titel</label>
      <input type="text" class="form-control" id="title" name="title" required>
    </div>

    <div class="mb-3">
      <label for="priority" class="form-label">Priorität</label>
      <select class="form-select" id="priority" name="priority" required>
        <option value="1">1 - Hoch</option>
        <option value="2" selected>2 - Mittel</option>
        <option value="3">3 - Niedrig</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">Anliegen</label>
      <textarea class="form-control" id="content" name="content" rows="12" required></textarea>
    </div>

    <button type="submit" class="btn btn-success">Speichern</button>
  </form>
</div>
{% endblock %}
