{% extends 'base.html' %}

{% block titel %}
Ticket Detail
{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>{{ item.title }}</h2>
  <p><strong>Prio:</strong> {{ item.priority }}</p>
  <p><strong>Von:</strong> {{ item.created_by }}</p>
  <hr>
  <p style="white-space: pre-wrap;">{{ item.content | safe }}</p>
</div>
{% endblock %}
